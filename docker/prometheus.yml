global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus scrapes itself.
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Pushgateway — synthetic metrics from push-synthetic-metrics.sh land here.
  # honor_labels: true preserves the job/instance labels set at push time.
  - job_name: pushgateway
    honor_labels: true
    static_configs:
      - targets: ['pushgateway:9091']
