receivers:
  address: "0.0.0.0:9911"   # shared inbound webhook bind address; ALL receivers mount here

alertmanager:
  enabled: true
  webhook_token_env: ALERTINT_WEBHOOK_TOKEN

storage:
  sqlite_path: /data/alertint-agent.db

llm:
  provider: anthropic
  api_key_env: ANTHROPIC_API_KEY
  model: claude-haiku-4-5

correlator:
  window_seconds: 90
  min_alerts: 2
  group_labels:
    - cluster

notify:
  stdout: true
  # To deliver findings to Slack: set enabled: true, put a bot token
  # (xoxb-…, chat:write scope) in SLACK_BOT_TOKEN in your .env, and set
  # your channel. The stack runs fine without Slack — findings go to stdout.
  slack:
    enabled: false
    bot_token_env: SLACK_BOT_TOKEN
    channel: "#alerts"

# Change-event webhook — receives deploy/config/flag events and stores them as
# triage context ("what changed before this incident?"). `alertint drill`
# plants its fake deploy through this door, so it stays enabled in the stack.
changes:
  ingress:
    enabled: true
    webhook_token_env: ALERTINT_CHANGES_WEBHOOK_TOKEN

# MCP HTTP server — AI coding agents (Claude Code, Cursor, Windsurf) connect
# to this endpoint over the network.
# Connect with: http://host:9912/mcp  (or localhost:9912/mcp for local Docker)
mcp:
  enabled: true
  addr: "0.0.0.0:9912"
  token_env: ALERTINT_MCP_TOKEN

# Prometheus read connector — queries this for metric context during incident
# investigation. For a guided first run use `alertint drill` (see the
# quickstart); push-synthetic-metrics.sh is optional extra realism for this
# compose stack only.
prometheus:
  enabled: true
  base_url: http://prometheus:9090
  timeout_seconds: 10
  default_range_minutes: 60

# Log enrichment (Loki) — pulls recent log lines at triage time and powers the
# read-only loki_query_range MCP tool. Seed the bundled Loki with fake lines:
#   task logs:push:local   (local)   /   task logs:push:cloud   (Grafana Cloud)
logs:
  enabled: true
  provider: loki
  timeout_seconds: 10
  default_range_minutes: 15
  max_lines: 50
  loki:
    base_url: http://loki:3100
    auth:
      mode: none
    # The bundled Loki's streams are labelled `app` (not `service`) and `instance`.
    # Map the alert label `service` -> stream label `app`; drop `instance` (no
    # stream-label equivalent is needed — there's one instance per app here).
    # Example: the worker incident's selector {service="worker"} becomes the
    # LogQL matcher {app="worker"}.
    label_map:
      service: app
      instance: ""
    # line_filter is omitted, so the error-biased default applies:
    #   |~ "(?i)(error|warn|fatal|panic|fail)"

  # ── Grafana Cloud Logs variant ──────────────────────────────────────────────
  # To read from Grafana Cloud instead of the local Loki: comment out the `loki:`
  # block above, uncomment this one, set GRAFANA_CLOUD_LOKI_TOKEN in .env, and
  # seed cloud with `task logs:push:cloud`. Get base_url + username from the
  # Grafana Cloud Portal → your stack → Loki → "Send Logs" (see
  # docs/integrations/loki.md). The values below are placeholders.
  # loki:
  #   base_url: https://logs-prod-006.grafana.net   # your Grafana Cloud Logs URL
  #   auth:
  #     mode: basic
  #     username: "123456"                          # your numeric instance/user ID
  #     password_env: GRAFANA_CLOUD_LOKI_TOKEN      # access-policy token (logs:read)
  #   label_map:
  #     service: app
  #     instance: ""

log_level: info
# Log output format: auto | console | json.
#   console — human-readable, colorized lines (this is what CLICOLOR_FORCE in
#             docker-compose.yaml colors); best for reading `docker logs`.
#   json    — structured, one object per line; best for machine ingestion.
#   auto    — console on a TTY, json otherwise. In a container stderr is NOT a
#             TTY, so auto would resolve to json — hence this stack sets console
#             explicitly to keep the logs readable.
log_format: console
