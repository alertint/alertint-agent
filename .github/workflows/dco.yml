name: DCO

on:
  pull_request:

permissions:
  contents: read

jobs:
  dco:
    name: Check sign-off
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Verify Signed-off-by trailer on every commit
        run: |
          missing=0
          for sha in $(git rev-list ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} --no-merges); do
            if ! git log -1 --format=%B "$sha" | grep -Eqi '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error::Commit $sha is missing a Signed-off-by trailer. Amend with: git commit -s --amend (or rebase with --signoff)."
              missing=1
            fi
          done
          exit $missing
