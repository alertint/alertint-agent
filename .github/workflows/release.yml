name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Changelog gate: the GitHub Release body is the CHANGELOG.md section for
      # this tag. No section -> no release; roll the changelog first with
      # `task release:prep VERSION=<x.y.z>` (see RELEASING.md).
      - name: Extract release notes from CHANGELOG.md
        run: ./scripts/release-notes.sh "${GITHUB_REF_NAME}" > /tmp/release-notes.md

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          check-latest: false

      - name: Set up QEMU (for arm64 Docker builds)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean --release-notes /tmp/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
